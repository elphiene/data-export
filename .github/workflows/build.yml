name: Build Windows EXE

on:
  push:
    branches: [main]
    paths:
      - "data-export/ink-density-tool/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:   # allows manual trigger from the Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: data-export/ink-density-tool
        run: pip install openpyxl pypdf pyinstaller

      - name: Build EXE
        working-directory: data-export/ink-density-tool
        run: pyinstaller build.spec

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: InkDensityTool-windows
          path: data-export/ink-density-tool/dist/InkDensityTool.exe
          retention-days: 30
