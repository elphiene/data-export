name: Build Windows EXE

on:
  push:
    branches: [main]
    paths:
      - "data-export/ink-density-tool/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:   # allows manual trigger from the Actions tab

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: data-export/ink-density-tool
        run: pip install openpyxl pypdf pyinstaller

      - name: Build EXE
        working-directory: data-export/ink-density-tool
        run: pyinstaller build.spec

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: InkDensityTool (latest)
          body: "Latest build from main. Download InkDensityTool.exe below."
          prerelease: false
          files: data-export/ink-density-tool/dist/InkDensityTool.exe
