name: Build Rust Ink Density Tool

on:
  push:
    paths:
      - 'data-export/ink-density-tool-rs/**'
    branches: [rust-version]
  pull_request:
    paths:
      - 'data-export/ink-density-tool-rs/**'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            data-export/ink-density-tool-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('data-export/ink-density-tool-rs/Cargo.lock') }}

      - name: Build release
        working-directory: data-export/ink-density-tool-rs
        run: cargo build --release

      - name: Run tests
        working-directory: data-export/ink-density-tool-rs
        run: cargo test --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: InkDensityTool-windows
          path: data-export/ink-density-tool-rs/target/release/ink-density-tool.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            data-export/ink-density-tool-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('data-export/ink-density-tool-rs/Cargo.lock') }}

      - name: Build release
        working-directory: data-export/ink-density-tool-rs
        run: cargo build --release

      - name: Run tests
        working-directory: data-export/ink-density-tool-rs
        run: cargo test --release
